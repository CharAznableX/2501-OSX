name: Build Unsigned DMG

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git for private packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Project 2501 (Unsigned)
        run: |
          # Build the app without signing
          xcodebuild -project App/project2501.xcodeproj \
            -scheme project2501 \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # Create build output directory
          mkdir -p build_output
          
          # Copy the built app
          cp -R ~/Library/Developer/Xcode/DerivedData/project2501-*/Build/Products/Release/project2501.app build_output/ || \
          cp -R build/Release/project2501.app build_output/ || \
          find ~/Library/Developer/Xcode/DerivedData -name 'project2501.app' -exec cp -R {} build_output/ \;

      - name: Create Unsigned DMG
        run: |
          # Create DMG using hdiutil (no signing required)
          hdiutil create -volname "Project 2501" -srcfolder build_output/project2501.app -ov -format UDZO build_output/Project2501-unsigned.dmg
          
          # Get version from app
          VERSION=$(defaults read "$(pwd)/build_output/project2501.app/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null || echo "1.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Also create a dated version
          DATE=$(date +%Y%m%d)
          cp build_output/Project2501-unsigned.dmg build_output/Project2501-${DATE}.dmg

      - name: Upload Unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: Project2501-unsigned-${{ env.VERSION }}
          path: |
            build_output/Project2501-unsigned.dmg
            build_output/Project2501-*.dmg
          if-no-files-found: warn

      - name: Create Release (on main branch)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create or update release
          gh release create "v${{ env.VERSION }}-unsigned" \
            build_output/Project2501-unsigned.dmg \
            --title "Project 2501 v${{ env.VERSION }} (Unsigned)" \
            --notes "Unsigned DMG build - requires quarantine removal on macOS:
          
          ## Installation
          
          1. Download the DMG
          2. Open the DMG
          3. Drag Project 2501 to Applications folder
          4. Remove quarantine (required for unsigned apps):
             \`\`\`bash
             xattr -cr /Applications/project2501.app
             \`\`\`
          5. Launch the app
          
          **Note:** This is an unsigned build. macOS will show a warning. Use the xattr command above to allow the app to run."
            --prerelease || \
          gh release upload "v${{ env.VERSION }}-unsigned" build_output/Project2501-unsigned.dmg --clobber
