name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-core:
    runs-on: macos-latest
    env:
      WORKSPACE: project2501.xcworkspace
      SPM_CACHE: .spm-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project2501.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: >-
          xcodebuild -resolvePackageDependencies
          -workspace $WORKSPACE
          -scheme Project2501CoreTests
          -clonedSourcePackagesDirPath $SPM_CACHE

      - name: Test Project2501Core
        run: >-
          xcodebuild test
          -workspace $WORKSPACE
          -scheme Project2501CoreTests
          -disableAutomaticPackageResolution
          -clonedSourcePackagesDirPath $SPM_CACHE
          -skip-testing Project2501CoreTests/KVCacheStoreTests
          -skip-testing Project2501CoreTests/MLXGenerationEngineTests

  test-cli:
    runs-on: macos-latest
    env:
      WORKSPACE: project2501.xcworkspace
      SPM_CACHE: .spm-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project2501.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: >-
          xcodebuild -resolvePackageDependencies
          -workspace $WORKSPACE
          -scheme Project2501CLITests
          -clonedSourcePackagesDirPath $SPM_CACHE

      - name: Test Project2501CLI
        run: >-
          xcodebuild test
          -workspace $WORKSPACE
          -scheme Project2501CLITests
          -disableAutomaticPackageResolution
          -clonedSourcePackagesDirPath $SPM_CACHE

  swiftlint:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
